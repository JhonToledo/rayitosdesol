<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Rayitos de Sol</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}"/>
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Rayitos de Sol"/>
      <h1>Rayitos de Sol</h1>
      <p>Panel de administración</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Ingresa tu contraseña" required autofocus/>
      </div>
      <button type="submit" class="btn-login">Entrar al panel</button>
    </form>

    <div class="login-back">
      <a href="/">← Ver sitio web</a>
    </div>
  </div>
</body>
</html>
